services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=dev
      - DATABASE_URL=postgresql+asyncpg://launchpad:launchpad@postgres:5432/launchpad
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_REDIRECT_URI=http://localhost:8000/api/v1/auth/google/callback
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-dev-secret-key-for-local-development-only}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - STRIPE_PRICE_ID_STARTER_MONTHLY=${STRIPE_PRICE_ID_STARTER_MONTHLY}
      - STRIPE_PRICE_ID_STARTER_YEARLY=${STRIPE_PRICE_ID_STARTER_YEARLY}
      - STRIPE_PRICE_ID_PRO_MONTHLY=${STRIPE_PRICE_ID_PRO_MONTHLY}
      - STRIPE_PRICE_ID_PRO_YEARLY=${STRIPE_PRICE_ID_PRO_YEARLY}
      - STRIPE_PRICE_ID_UNLIMITED_MONTHLY=${STRIPE_PRICE_ID_UNLIMITED_MONTHLY}
      - STRIPE_PRICE_ID_UNLIMITED_YEARLY=${STRIPE_PRICE_ID_UNLIMITED_YEARLY}
      - FRONTEND_URL=http://localhost:5173
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - backend_venv:/app/.venv
      - backend_uploads:/app/uploads
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=launchpad
      - POSTGRES_PASSWORD=launchpad
      - POSTGRES_DB=launchpad
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U launchpad"]
      interval: 5s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000/api/v1
    volumes:
      - ./src:/app/src
      - ./public:/app/public
      - ./index.html:/app/index.html
    depends_on:
      - backend
    command: pnpm dev --host

volumes:
  postgres_data:
  backend_venv:
  backend_uploads:
